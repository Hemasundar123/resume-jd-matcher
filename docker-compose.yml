services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: matcher-db
    environment:
      POSTGRES_DB: matcher
      POSTGRES_USER: matcher
      POSTGRES_PASSWORD: matcher
    ports:
      - "5432:5432"
    volumes:
      - matcher_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matcher"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  matcher_pgdata: