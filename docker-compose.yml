services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: matcher-db
    environment:
      POSTGRES_DB: matcher
      POSTGRES_USER: matcher
      POSTGRES_PASSWORD: matcher
    ports:
      - "5432:5432"
    volumes:
      - matcher_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matcher"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matcher-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/matcher
      SPRING_DATASOURCE_USERNAME: matcher
      SPRING_DATASOURCE_PASSWORD: matcher
      SPRING_AI_OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      # host.docker.internal only resolves automatically on Docker Desktop (Mac/Windows).
      # On Linux this line is what makes it work.
      - "host.docker.internal:host-gateway"
    ports:
      - "8080:8080"

volumes:
  matcher_pgdata: