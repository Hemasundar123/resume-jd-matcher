services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matcher-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://ep-dry-mountain-az5nl1wq.c-3.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
      SPRING_DATASOURCE_USERNAME: neondb_owner
      SPRING_DATASOURCE_PASSWORD: ${NEON_DB_PASSWORD}
      SPRING_AI_OPENAI_API_KEY: ${NARAROUTER_API_KEY}
      SPRING_AI_OPENAI_BASE_URL: https://router.bynara.id
    ports:
      - "8080:8080"
