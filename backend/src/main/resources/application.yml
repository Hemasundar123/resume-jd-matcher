spring:
  application:
    name: resume-jd-matcher
  datasource:
    url: jdbc:postgresql://ep-dry-mountain-az5nl1wq.c-3.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
    username: neondb_owner
    password: ${NEON_DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${NARAROUTER_API_KEY}
      base-url: https://router.bynara.id
      chat:
        options:
          model: mistral-medium-3-5
          temperature: 0.2
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 384

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.hemasundar.matcher: DEBUG
