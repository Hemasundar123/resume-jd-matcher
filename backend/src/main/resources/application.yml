spring:
  application:
    name: resume-jd-matcher
  datasource:
    url: jdbc:postgresql://localhost:5432/matcher
    username: matcher
    password: matcher
  jpa:
    hibernate:
      ddl-auto: validate      
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY}
      chat:
        options:
          model: claude-sonnet-4-20250514
          temperature: 0.2
    vectorstore:
      pgvector:
        initialize-schema: false   
        dimensions: 384            

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.hemasundar.matcher: DEBUG
