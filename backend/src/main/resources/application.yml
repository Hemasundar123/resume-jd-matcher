spring:
  application:
    name: resume-jd-matcher
  datasource:
    url: jdbc:postgresql://localhost:5432/matcher
    username: matcher
    password: matcher
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.2
          temperature: 0.2
          format: json
          num-predict: 1024
    vectorstore:
      pgvector:
        initialize-schema: false
        dimensions: 384

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.hemasundar.matcher: DEBUG
